packages:
  # Aplicaciones desplegables de forma independiente
  - 'apps/**'
  # Paquetes de configuración, diseño, base de datos y simulaciones compartidas
  - 'packages/**'
  # El output "standalone" de Next.js espeja apps/frontend/package.json
  # dentro de .next/ — sin esta exclusión, pnpm/turbo lo detectan como un
  # segundo workspace "frontend" duplicado en cada build local.
  - '!apps/**/.next/**'
  - '!apps/**/dist/**'
# Requerido por `pnpm deploy` (usado en los Dockerfiles) para empaquetar
# dependencias workspace:* como archivos reales en vez de symlinks.
injectWorkspacePackages: true
# pnpm 11 gestiona su propio binario como "packageManagerDependency" cuando
# devEngines.packageManager.onFail = "download" está presente, escribiendo
# un segundo documento YAML en pnpm-lock.yaml. El pnpm que usa el build de
# Vercel no soporta ese lockfile multi-documento (`expected a single
# document in the stream, but found more`) — deshabilitado, no lo
# necesitamos (Vercel/CI/Docker ya resuelven pnpm por su cuenta vía
# packageManager/corepack). Ver DECISIONS.md.
managePackageManagerVersions: false
allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - lucide-react@1.25.0
