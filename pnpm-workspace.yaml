packages:
  # Aplicaciones desplegables de forma independiente
  - 'apps/**'
  # Paquetes de configuración, diseño, base de datos y simulaciones compartidas
  - 'packages/**'
allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - lucide-react@1.25.0
