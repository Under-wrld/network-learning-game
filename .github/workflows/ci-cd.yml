name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      API_PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Los tests corren contra la base de datos real de Supabase (cero
      # mocks, ver CLAUDE.md/DECISIONS.md) — estos secrets deben cargarse en
      # Settings → Secrets and variables → Actions del repo de GitHub.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Los tests de Auth crean/eliminan usuarios reales vía la Admin API de
      # Supabase para obtener access tokens ES256 genuinos (ver DECISIONS.md).
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🔎 Typecheck
        run: pnpm typecheck

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🧪 Tests
        run: pnpm test

      - name: 🏗️ Build
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen backend
        run: docker build -f apps/backend/Dockerfile -t backend:ci .

      - name: Build imagen frontend
        run: |
          docker build -f apps/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_API_URL="http://localhost:3001" \
            -t frontend:ci .

  # El deploy real (Vercel para el frontend, Railway para el backend) se hace
  # manualmente vía CLI en esta etapa del proyecto — ver CONTRIBUTING.md.
  # No hay job de deploy automático todavía.
