# Topología de producción (self-hosted). Postgres NO se incluye acá — el
# proyecto usa Supabase como Postgres gestionado (ver DECISIONS.md); DATABASE_URL
# apunta a Supabase incluso en este stack. Se ejecuta desde la raíz del repo:
#   docker compose -f docker/docker-compose.yml --env-file .env up --build
services:
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Provisto para rate limiting/caching (CLAUDE.md módulo 25); todavía no
  # está integrado en la lógica de apps/backend — ver DECISIONS.md.
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
